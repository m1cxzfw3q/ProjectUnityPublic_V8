## Koruh的物品
item.unity-stone.name = 石头
item.unity-stone.description = 坚硬且密度适中的资源，在外地壳中丰富。
item.unity-stone.details = 石头似乎对孢子有抵抗力。然而，在更深处发现的远古形成的石头痕迹却没有这种抵抗力，尽管它们更软且更多用途。
item.unity-steel.name = 钢
item.unity-steel.description = 坚硬、回火金属。它能有效储存[#84ff00]Exp.[]，并且高度耐腐蚀。
item.unity-dense-alloy.name = 致密合金
item.unity-dense-alloy.description = 铜和铅的基本合金。密度高，因此得名。
item.unity-dense-alloy.details = 由于铅和铜通常不混合，需要在极高的热量和压力下加工。目前没有技术能承受这一点，尽管在古代废墟中发现了致密合金的痕迹。
item.unity-dirium.name = 迪里姆合金
item.unity-dirium.description = 由多种元素组成的复杂合金。它是[#84ff00]Exp.[]的良好导体，当注入[#84ff00]Exp.[]时可以重现许多非自然行为。
item.unity-dirium.details = 尚不清楚这种迪里姆合金是否与古代记录中提到的"迪里姆合金"相同。然而，由于它可以复制这种材料的许多声称特性，例如能够传送物质，化学上不会相差太远。讽刺的是，这种材料在化学上本不应存在。

