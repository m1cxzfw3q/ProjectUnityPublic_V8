liquid.unity-lava.description = 熔化的石头，非常热。小心处理。

# Koruh的建筑
## 生产
block.unity-liquifier.name = 液化器
block.unity-liquifier.description = 将石头熔化成岩浆。
block.unity-solidifier.name = 固化器
block.unity-solidifier.description = 将岩浆冷却成石头。需要水用于冷却。
block.unity-steel-smelter.name = 冶炼炉
block.unity-steel-smelter.description = 使用煤作为燃料，将致密合金和浓缩碳熔炼成钢。虽然简单，但效率很低。
block.unity-dense-smelter.name = 熔炉
block.unity-dense-smelter.description = 在高温下燃烧铜和铅以产生致密合金。没有[#84ff00]Exp.[]时，无法承受高温，会逐渐损失生命值。
block.unity-steel-smelter.details = 尽管这个工厂是使用从废墟中恢复的蓝图重建的，但其效率远低于预期。要么这些元素实际上是同位素，自那以后已经完全衰变，要么蓝图遗漏了某些关键东西。
block.unity-lava-smelter.name = 岩浆冶炼炉
block.unity-lava-smelter.description = 一种先进的冶炼炉，使用岩浆将致密合金和浓缩碳熔炼成钢。只有使用[#84ff00]Exp.[]才能承受岩浆冶炼的高温，如果[#84ff00]Exp.[]不足会瞬间熔化。
block.unity-lava-smelter.details = 这种迭代的冶炼炉由于某种未知原因效率更高。流行的理论是，我们现在称之为"[#84ff00]Exp.[]"的东西在古代实际上很普遍并存在于大气中，为这些不科学的设计注入了生命。
block.unity-dirium-crucible.name = 坩埚
block.unity-dirium-crucible.description = 用强热和[#84ff00]Exp.[]将重金属融合锻造迪里姆合金。\n建议使用处理器防止堵塞，因为这个方块只有4个面。
block.unity-dirium-crucible.details = 从传说和古代故事到废墟的不完整翻译，材料"迪里姆合金"被提及为一种用于任何魔法特性的万能材料。经过无数次的尝试和错误，这种相当奇怪的稀有金属组合似乎最能符合"迪里姆合金"的描述。
block.unity-coal-extractor.name = 煤炭提取器
block.unity-coal-extractor.description = 使用水从大量石头中提取煤炭。如果没有足够的[#84ff00]Exp.[]不会受到伤害，但如果没有足够的[#84ff00]Exp.[]，它不会提取煤炭。
block.unity-coal-extractor.details =
block.unity-titanium-extractor.name = 钛提取器
block.unity-titanium-extractor.description = 从钢和致密合金中提取钛。
block.unity-titanium-extractor.details =

