# 物品
## Youngcha的物品
item.unity-nickel.name = 镍
item.unity-nickel.description = 一种坚硬但柔韧的金属。在地表很少发现大型矿簇。
item.unity-nickel.details = 目前尚不清楚为何Youngcha的母星有大量的镍。据推测，过去的一次巨大碰撞使行星地壳大量剥落。
item.unity-cupronickel.name = 铜镍合金
item.unity-cupronickel.description = 镍和铜的基本合金。有效且耐用的导热体。
item.unity-cupronickel.details = Youngcha在材料科学方面的掌握通常通过这种合金的灵活应用来体现。
item.unity-super-alloy.name = 超级合金
item.unity-super-alloy.description = 镍的高级合金。一种罕见的室温超导材料。
item.unity-super-alloy.details = 该派系的巅峰成就之一，很少有外人知道其配方，更不用说生产了。最近的研究发现这种材料具有可以直接武器化的奇异特性...
item.unity-sulfur.name = 硫磺
item.unity-sulfur.description = 一种具有无数用途的非金属晶体物质。
item.unity-sulfur.details = 虽然难以提取，但其制造酸的能力受到那些知道如何利用它的人的重视。

