## 墙壁
block.unity-steel-wall.name = 钢墙
block.unity-steel-wall.description = 致密耐用的墙。材料的密度使其对高能打击具有更高的抵抗力。
block.unity-steel-wall-large.name = 大型钢墙
block.unity-steel-wall-large.description = 致密耐用的墙。材料的密度使其对高能打击具有更高的抵抗力。跨越多格。
block.unity-ustone-wall.name = 石墙
block.unity-ustone-wall.description = 简单廉价的墙。它容易碎裂，但组成它的石头出人意料地耐用，能承受最强的打击。因此，它具有有趣的行为：承受单次打击，而如果随时间累积则会碎裂。
block.unity-dense-wall.name = 致密合金墙
block.unity-dense-wall.description = 稍微更致密耐用的墙。材料的密度使其对高能打击具有高抵抗力。
block.unity-dirium-wall.name = 迪里姆合金墙
block.unity-dirium-wall.description = 具有有趣特性的高耐用性墙。材料的耐用性使其对高能打击具有高抵抗力，并且在受到打击后似乎会在一段时间内抵抗伤害。
block.unity-dirium-wall-large.name = 大型迪里姆合金墙
block.unity-dirium-wall-large.description = 具有有趣特性的高耐用性墙。材料的耐用性使其对高能打击具有高抵抗力，并且在受到打击后似乎会在一段时间内抵抗伤害。跨越多格。

