block.unity-wind-turbine.name = 风力涡轮机
block.unity-wind-turbine.description = 从风中产生扭矩。
block.unity-rotary-water-extractor.name = 螺旋抽水机
block.unity-rotary-water-extractor.description = 从深层地下水库中抽取水。
block.unity-auger-drill.name = 螺旋钻头
block.unity-auger-drill.description = 浅层钻机，但能挖掘大量地面。
block.unity-wall-drill.name = 墙壁钻机
block.unity-wall-drill.description = 可用于钻取墙壁矿石...或敌方单位的钻机。
block.unity-heat-pipe.name = 热管
block.unity-heat-pipe.description = 将热量传递到相邻的热管。
block.unity-flywheel.name = 飞轮
block.unity-flywheel.description = 沉重的飞轮。可以使用来自其他轴方块或蒸汽活塞的外部力旋转。
block.unity-steam-piston.name = 蒸汽活塞
block.unity-steam-piston.description = 可安装在飞轮侧面的蒸汽活塞。需要水和热量（100°C）才能工作。
block.unity-combustion-heater.name = 燃烧加热器
block.unity-combustion-heater.description = 燃烧可燃物品产生热量。可燃性越高的物品产生越多热量。
block.unity-thermal-heater.name = 热力加热器
block.unity-thermal-heater.description = 从高温地块产生热量。
block.unity-seebeck-generator.name = 塞贝克发电机
block.unity-seebeck-generator.description = 想要自定义温差发电机吗？当两侧温度不同时发电。
block.unity-small-radiator.name = 小型散热器
block.unity-small-radiator.description = 将其热量散发到空气中。
block.unity-crucible.name = 坩埚
block.unity-crucible.description = 用于熔化物品的坩埚。
block.unity-crucible-channel.name = 坩埚通道
block.unity-crucible-channel.description = 传输坩埚液体。\n[red]请不要饮用禁果之汁。
block.unity-crucible-pump.name = 坩埚泵
block.unity-crucible-pump.description = 过滤并推送坩埚液体。
block.unity-casting-mold.name = 铸模
block.unity-casting-mold.description = 将坩埚液体重新铸造成物品。可用于固化熔化物品的混合物，例如将熔化的沙子和铅固化为钢化玻璃。
block.unity-payload-casting-mold.name = 载荷铸造器
block.unity-payload-casting-mold.description = 铸造特定的1x1方块，主要是墙壁和模块方块。
block.unity-crucible-source.name = 坩埚源
block.unity-crucible-source.description = 产生任何坩埚可以制造的液体。仅沙盒模式。
block.unity-inserter-arm.name = 插入臂
block.unity-inserter-arm.description = 移动和旋转小型载荷。\n你可以用这些建造一个基地！
block.unity-graphite-batch-press.name = 石墨批量压机
block.unity-graphite-batch-press.description = 石墨压机的高效版本。需要旋转能量才能运行。

