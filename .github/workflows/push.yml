name: Java CI

on: [push]

jobs:
  buildJar:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up JDK 17
      uses: actions/setup-java@v1
      with:
        java-version: 17

    - name: Set up PATH
      run: echo "${ANDROID_HOME}/build-tools/34.0.0" >> $GITHUB_PATH

    - name: General information
      run: |
        java --version
        d8 --version

    - name: Build and dexify mod jar file
      run: |
        chmod +x gradlew
        ./gradlew main:deploy main:dex tools:proc

    - name: Upload built mod jar file
      uses: actions/upload-artifact@v4
      with:
        name: ProjectUnity (zipped)
        path: main/build/libs/ProjectUnityAggregate.jar
        
      
    - name: Make a tag name
      if: github.ref == 'refs/heads/master'
      run: |
        TAG="$(date +%Y%m%d%H%M%S)"
        echo "tag_name=$TAG" >> $GITHUB_OUTPUT
      id: tag_make

    - name: Create Release
      if: github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag_make.outputs.tag_name }}
        files: main/build/libs/ProjectUnityAggregate.jar
        generate_release_notes: true
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
